{
  "options": {
    "config_plugin": "filesystem",
    "logger_plugin": "filesystem",
    "logger_path": "/Users/Shared/thesis-phase1/osquery_logs",
    "disable_logging": "false",
    "schedule_splay_percent": "10",
    "events_expiry": "3600",
    "host_identifier": "ueba_thesis_lab",
    "verbose": "false",
    "worker_threads": "2",
    "disable_events": "false"
  },
  "schedule": {
    "running_apps_snapshot": {
      "query": "SELECT pid, bundle_identifier FROM running_apps LIMIT 50;",
      "interval": 5,
      "description": "Snapshot of running apps every 5 seconds."
    },
    "user_processes_snapshot": {
      "query": "SELECT pid, name, path FROM processes WHERE uid >= 500;",
      "interval": 30,
      "description": "User-space processes snapshot."
    },
    "process_events_stream": {
      "query": "SELECT pid, path, cmdline, parent, event_type, time FROM es_process_events WHERE time > 0 AND path != '' AND path NOT LIKE '/System/%' AND path NOT LIKE '/usr/%' AND path NOT LIKE '/private/var/%' AND path NOT LIKE '/Library/%' AND path NOT LIKE '/sbin/%' AND path NOT LIKE '/bin/%';",
      "interval": 10,
      "removed": false,
      "description": "ES process events, filtered to user-attributable binaries only."
    },
    "file_events_stream": {
      "query": "SELECT pid, path, filename, dest_filename, event_type, time FROM es_process_file_events WHERE time > 0 AND path NOT LIKE '/usr/%' AND path NOT LIKE '/sbin/%' AND path NOT LIKE '/bin/%' AND path NOT LIKE '/System/%' AND filename NOT LIKE '/System/%' AND filename NOT LIKE '/Library/%' AND filename NOT LIKE '/Users/xulex/Library/%' AND filename NOT LIKE '/Users/LABamico/Library/%' AND filename NOT LIKE '/private/var/%' AND filename NOT LIKE '/usr/%' AND filename NOT LIKE '/Volumes/%' AND filename NOT LIKE '/dev/%' AND filename NOT LIKE '/Users/xulex/thesis-phase1/%' AND filename NOT LIKE '/Users/LABamico/thesis-phase1/%' AND filename NOT LIKE '/Users/Shared/thesis-phase1/%' AND filename NOT LIKE '/Users/xulex/Pictures/%' AND filename NOT LIKE '/Users/LABamico/Pictures/%' AND filename NOT LIKE '/Users/xulex/.zsh%' AND filename NOT LIKE '/Users/LABamico/.zsh%' AND filename NOT LIKE '/Users/xulex/.DS_Store%' AND filename NOT LIKE '/Users/LABamico/.DS_Store%' AND filename NOT LIKE '/Users/xulex/.bash%' AND filename NOT LIKE '/Users/LABamico/.bash%' AND filename NOT LIKE '/Users/xulex/.cache/%' AND filename NOT LIKE '/Users/LABamico/.cache/%' AND filename NOT LIKE '/Users/xulex/.local/%' AND filename NOT LIKE '/Users/LABamico/.local/%' AND filename NOT LIKE '%.crdownload' AND filename NOT LIKE '/Users/xulex/Downloads/.com.google.Chrome.%' AND filename NOT LIKE '/Users/LABamico/Downloads/.com.google.Chrome.%' AND filename NOT LIKE '/Users/xulex/Downloads/.%' AND filename NOT LIKE '/Users/LABamico/Downloads/.%';",
      "interval": 10,
      "removed": false,
      "description": "ES file events. Excludes system paths, caches, downloads-in-progress, Chrome/app temp download artifacts, and operator activity for both xulex and LABamico. Project files under /Users/Shared/thesis-phase1 are also excluded so the daemon does not log its own session output."
    }
  },
  "decorators": {
    "load": [
      "SELECT uuid AS host_uuid FROM system_info;",
      "SELECT user AS username FROM logged_in_users WHERE user != '' LIMIT 1;"
    ]
  }
}
